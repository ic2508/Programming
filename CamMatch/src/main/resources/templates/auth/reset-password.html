<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parola noua</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="container narrow section">
    <div class="card form-card">
        <h1>Seteaza parola noua</h1>
        <p class="alert error" th:if="${error}" th:text="${error}"></p>
        <form th:action="@{/reset-password}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="token" th:value="${token}">
            <label>Parola noua</label>
            <input type="password" name="password" minlength="6" pattern="(?=.*[A-Za-z])(?=.*\d)(?=.*[^A-Za-z0-9]).{6,}" title="Minimum 6 caractere, litere, cifre si un caracter special" required>
            <button type="submit" class="btn">Salveaza parola</button>
        </form>
    </div>
</main>
</body>
</html>
