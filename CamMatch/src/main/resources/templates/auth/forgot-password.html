<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetare parola</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="container narrow section">
    <div class="card form-card">
        <h1>Resetare parola</h1>
        <form th:action="@{/forgot-password}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>Email</label>
            <input type="email" name="email" required>
            <button type="submit" class="btn">Genereaza link</button>
        </form>
        <div class="alert success" th:if="${sent}">
            <p>Daca emailul exista, s-a generat un link de resetare.</p>
            <a th:if="${resetLink}" th:href="${resetLink}" th:text="${resetLink}">Reset</a>
        </div>
    </div>
</main>
</body>
</html>
