<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CamMatch</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="container narrow section">
    <div class="card form-card">
        <h1>Autentificare</h1>
        <p class="alert error" th:if="${param.error}">Email, parola incorecta, cont neconfirmat sau cont dezactivat.</p>
        <p class="alert success" th:if="${param.logout}">Ai iesit din cont.</p>
        <form th:action="@{/login}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>Email</label>
            <input type="email" name="email" required>
            <label>Parola</label>
            <input type="password" name="password" required>
            <button type="submit" class="btn">Intra in cont</button>
        </form>
        <p><a th:href="@{/forgot-password}">Ai uitat parola?</a></p>
    </div>
</main>
</body>
</html>
