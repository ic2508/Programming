<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inregistrare - CamMatch</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="container narrow section">
    <div class="card form-card">
        <h1>Cont nou</h1>
        <p class="alert error" th:if="${error}" th:text="${error}"></p>
        <form th:action="@{/register}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>Username</label>
            <input type="text" name="username" minlength="3" required>
            <label>Email</label>
            <input type="email" name="email" required>
            <label>Parola</label>
            <input type="password" name="password" minlength="6" pattern="(?=.*[A-Za-z])(?=.*\d)(?=.*[^A-Za-z0-9]).{6,}" title="Minimum 6 caractere, litere, cifre si un caracter special" required>
            <button type="submit" class="btn">Creeaza cont</button>
        </form>
    </div>
</main>
</body>
</html>
