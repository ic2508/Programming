<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cautare - CamMatch</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="container section">
    <div class="page-head">
        <h1>Cautare camere</h1>
        <form th:action="@{/search}" method="get" class="search-form">
            <input type="text" name="q" placeholder="Cauta dupa brand sau model" th:value="${q}">
            <button class="btn small" type="submit">Cauta</button>
        </form>
    </div>
    <p class="muted" th:if="${q != null && !q.isBlank()}">Rezultate pentru: <strong th:text="${q}">query</strong></p>
    <div class="grid cards-3">
        <article class="card" th:each="camera : ${results}">
            <img th:src="${camera.imageUrl == null || camera.imageUrl.isBlank() ? '/images/camera-placeholder.svg' : camera.imageUrl}" alt="Camera foto" class="camera-img" onerror="this.onerror=null;this.src='/images/camera-placeholder.svg';">
            <h3 th:text="${camera.fullName}">Camera</h3>
            <div class="rating-line"><span class="star-rating" aria-label="Rating"><span class="star-bg">★★★★★</span><span class="star-fill" th:style="|width: ${camera.starPercent}%|">★★★★★</span></span> <strong class="rating-value" th:text="${camera.ratingLabel}">Not rated</strong> <span class="muted" th:if="${camera.ratingCount > 0}" th:text="|(${camera.ratingCount} evaluari)|"></span></div>
            <p class="muted"><span th:text="${camera.type}"></span> • <span th:text="${camera.photographyType}"></span></p>
            <p><strong th:text="${camera.price}"></strong> RON</p>
            <a class="btn secondary small" th:href="@{/cameras/{id}(id=${camera.id})}">Detalii</a>
        </article>
    </div>
</main>
</body>
</html>
