<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formular camera</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="container narrow section">
    <div class="card form-card">
        <h1>Camera foto</h1>
        <form th:action="@{/admin/cameras/save}" th:object="${camera}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{id}">
            <label>Brand</label>
            <input type="text" th:field="*{brand}" required>
            <label>Model</label>
            <input type="text" th:field="*{model}" required>
            <label>Tip</label>
            <input type="text" th:field="*{type}" required>
            <label>Tip fotografie</label>
            <input type="text" th:field="*{photographyType}" required>
            <label>Pret</label>
            <input type="number" step="0.01" th:field="*{price}" required>
            <label>Rezolutie MP</label>
            <input type="number" step="0.1" th:field="*{resolutionMp}" required>
            <label>Autonomie cadre</label>
            <input type="number" th:field="*{batteryShots}" required>
            <label>Senzor</label>
            <input type="text" th:field="*{sensor}">
            <label>Video</label>
            <input type="text" th:field="*{video}">
            <label>Imagine URL</label>
            <input type="text" th:field="*{imageUrl}">
            <div class="rating-line" th:if="${camera.id != null}">Rating curent: <span class="star-rating" aria-label="Rating"><span class="star-bg">★★★★★</span><span class="star-fill" th:style="|width: ${camera.starPercent}%|">★★★★★</span></span> <strong class="rating-value" th:text="${camera.ratingLabel}">Not rated</strong> <span class="muted" th:if="${camera.ratingCount > 0}" th:text="|(${camera.ratingCount} evaluari)|"></span></div>
            <label>Descriere</label>
            <textarea rows="5" th:field="*{description}"></textarea>
            <button class="btn" type="submit">Salveaza</button>
        </form>
    </div>
</main>
</body>
</html>
