<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin camere</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="container section">
    <div class="page-head">
        <h1>Administrare camere</h1>
        <a class="btn" th:href="@{/admin/cameras/new}">Adauga camera</a>
    </div>
    <div class="table-wrapper">
        <table class="data-table" data-sortable="true">
            <thead>
            <tr>
                <th data-sort="number">ID</th>
                <th data-sort="text">Camera</th>
                <th data-sort="text">Tip</th>
                <th data-sort="number">Rating</th>
                <th data-sort="number">Pret</th>
                <th>Actiuni</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="camera : ${cameras}">
                <td th:text="${camera.id}" th:attr="data-sort-value=${camera.id}"></td>
                <td th:text="${camera.fullName}" th:attr="data-sort-value=${camera.fullName}"></td>
                <td th:text="${camera.type}" th:attr="data-sort-value=${camera.type}"></td>
                <td th:attr="data-sort-value=${camera.ratingCount > 0 ? camera.averageRating : 0}"><span th:text="${camera.ratingLabel}">Not rated</span> <span th:if="${camera.ratingCount > 0}" th:text="|(${camera.ratingCount})|"></span></td>
                <td th:attr="data-sort-value=${camera.price}"><span th:text="${camera.price}"></span> RON</td>
                <td class="actions-cell">
                    <a class="btn small secondary" th:href="@{/admin/cameras/{id}/edit(id=${camera.id})}">Editare</a>
                    <form th:action="@{/admin/cameras/{id}/delete(id=${camera.id})}" method="post" onsubmit="return confirm('Stergi camera?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn small danger" type="submit">Sterge</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script th:src="@{/js/table-sort.js}"></script>
</body>
</html>
