<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorite - CamMatch</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="container section">
    <h1>Camere favorite</h1>
    <p class="muted">Lista este inspirata din varianta Flask si este integrata in proiectul final Spring Boot.</p>
    <p th:if="${favorites.isEmpty()}" class="card">Nu ai camere favorite.</p>
    <div class="grid cards-3">
        <article class="card" th:each="favorite : ${favorites}">
            <img th:src="${favorite.camera.imageUrl == null || favorite.camera.imageUrl.isBlank() ? '/images/camera-placeholder.svg' : favorite.camera.imageUrl}" alt="Camera foto" class="camera-img" onerror="this.onerror=null;this.src='/images/camera-placeholder.svg';">
            <h3 th:text="${favorite.camera.fullName}">Camera</h3>
            <div class="rating-line"><span class="star-rating" aria-label="Rating"><span class="star-bg">★★★★★</span><span class="star-fill" th:style="|width: ${favorite.camera.starPercent}%|">★★★★★</span></span> <strong class="rating-value" th:text="${favorite.camera.ratingLabel}">Not rated</strong> <span class="muted" th:if="${favorite.camera.ratingCount > 0}" th:text="|(${favorite.camera.ratingCount} evaluari)|"></span></div>
            <p class="muted"><span th:text="${favorite.camera.type}"></span> • <span th:text="${favorite.camera.photographyType}"></span></p>
            <p><strong th:text="${favorite.camera.price}"></strong> RON</p>
            <div class="actions">
                <a class="btn secondary small" th:href="@{/cameras/{id}(id=${favorite.camera.id})}">Detalii</a>
                <form th:action="@{/favorites/{id}/toggle(id=${favorite.camera.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn danger small" type="submit">Sterge</button>
                </form>
            </div>
        </article>
    </div>
</main>
</body>
</html>
