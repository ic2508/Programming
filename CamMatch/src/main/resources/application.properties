spring.application.name=CamMatch
server.port=8080

# Baza de date MySQL folosita implicit.
# Datele se salveaza permanent si se vad imediat in MySQL Workbench.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cammatch_final?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:cammatch_user}
spring.datasource.password=${DB_PASSWORD:cammatch123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# H2 ramane disponibil doar daca pornesti cu profilul h2:
# mvn spring-boot:run -Dspring-boot.run.profiles=h2
spring.h2.console.enabled=false

spring.thymeleaf.cache=false
server.error.whitelabel.enabled=false
